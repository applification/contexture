<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Three nodes in a triangle connected by lines: subject-predicate-object -->
  <!-- Connectors -->
  <line x1="8" y1="24" x2="24" y2="24" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="8" y1="24" x2="16" y2="8" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="16" y2="8" stroke="#818cf8" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="16" cy="8" r="3.5" fill="#818cf8"/>
  <circle cx="8" cy="24" r="3.5" fill="#818cf8"/>
  <circle cx="24" cy="24" r="3.5" fill="#22d3ee"/>
</svg>
