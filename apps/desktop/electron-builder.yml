appId: com.applification.contexture
productName: Contexture
directories:
  buildResources: build
files:
  - out/**
  - package.json
  - '!node_modules/@anthropic-ai/claude-agent-sdk-*/**'
  - '!**/.turbo/**'
  - '!**/.vite/**'
  - '!**/.vscode/**'
  - '!**/.storybook/**'
  - '!**/__tests__/**'
  - '!**/__snapshots__/**'
  - '!**/coverage/**'
  - '!**/demo/**'
  - '!**/docs/**'
  - '!**/e2e/**'
  - '!**/examples/**'
  - '!**/test/**'
  - '!**/tests/**'
  - '!**/*.d.ts'
  - '!**/*.d.mts'
  - '!**/*.map'
  - '!**/CHANGELOG*'
  - '!**/README*'
  - '!**/*.ts'
  - '!**/*.tsx'
extraResources:
  # Stdlib IR sidecars — read at app startup so qualified refs
  # (e.g. `common.Email`) resolve without depending on the published
  # @contexture/runtime package.
  - from: ../../packages/stdlib/src
    to: stdlib
    filter:
      - '*.contexture.json'
  # Contexture skills plugin — Agent SDK loads these at session start.
  - from: resources/skills
    to: skills
    filter:
      - '.claude-plugin/**'
      - 'skills/**'
win:
  executableName: Contexture
  icon: build/icon.ico
nsis:
  artifactName: ${productName}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  icon: build/icon.icns
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSDocumentsFolderUsageDescription: Contexture needs access to open and save schema files.
  notarize: true
  target:
    - dmg
    - zip
dmg:
  artifactName: ${productName}-${version}.${ext}
linux:
  icon: build/icon.png
  target:
    - AppImage
    - deb
  maintainer: applification.co.uk
  category: Development
deb:
  artifactName: ${productName}-${version}-${arch}.${ext}
appImage:
  artifactName: ${productName}-${version}.${ext}
npmRebuild: false
publish:
  provider: github
  owner: applification
  repo: contexture
  releaseType: release
