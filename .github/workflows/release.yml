name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24
      - name: Verify desktop version matches release tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          node <<'NODE'
          const fs = require("node:fs");

          const tag = (process.env.TAG_NAME || "").replace(/^v/, "");
          const version = JSON.parse(
            fs.readFileSync("apps/desktop/package.json", "utf8"),
          ).version;

          if (version !== tag) {
            console.error(
              `Release tag ${process.env.TAG_NAME} does not match apps/desktop/package.json version ${version}.`,
            );
            process.exit(1);
          }

          console.log(`Release version ${version} matches ${process.env.TAG_NAME}.`);
          NODE
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes

  build:
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load desktop env (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/desktop
        env:
          INFISICAL_ENV: prod
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Build
        run: bun run build --filter=@contexture/desktop

      - name: Package and publish (macOS)
        if: matrix.platform == 'mac'
        env:
          GH_TOKEN: ${{ github.token }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: bunx electron-builder --mac --publish always
        working-directory: apps/desktop

      - name: Package and publish (Windows)
        if: matrix.platform == 'win'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bunx electron-builder --win --publish always
        working-directory: apps/desktop

      - name: Package and publish (Linux)
        if: matrix.platform == 'linux'
        env:
          GH_TOKEN: ${{ github.token }}
        run: bunx electron-builder --linux --publish always
        working-directory: apps/desktop
