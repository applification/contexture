name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    name: Quality checks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load desktop env (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/desktop
        env:
          INFISICAL_ENV: staging
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Load web env (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/web
        env:
          INFISICAL_ENV: staging
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Check formatting
        run: bun run format:check

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run typecheck

      - name: Test
        run: bun run test

      - name: Build desktop
        run: bun run build --filter=@contexture/desktop

      - name: Build Storybook
        run: cd apps/desktop && npx storybook build

  e2e:
    name: E2E tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Load web env (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/web
        env:
          INFISICAL_ENV: staging
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Install Playwright browsers
        run: cd apps/web && npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: cd apps/web && npx playwright test

  e2e-electron:
    name: Electron E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2.0.2
        with:
          bun-version: 1.3.10

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Electron system dependencies (Linux)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 \
            libxrandr2 libgbm1 libasound2t64 libpango-1.0-0 libcairo2 \
            libx11-xcb1 xvfb

      - name: Load desktop env (varlock)
        uses: dmno-dev/varlock-action@v1.0.1
        with:
          working-directory: apps/desktop
        env:
          INFISICAL_ENV: staging
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Build desktop app
        run: bun run build --filter=@contexture/desktop

      - name: Install Playwright Electron browsers
        run: cd apps/desktop && npx playwright install chromium --with-deps

      - name: Run Electron E2E tests
        run: cd apps/desktop && xvfb-run --auto-servernum npx playwright test
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-electron-report
          path: apps/desktop/test-results/
          retention-days: 14
